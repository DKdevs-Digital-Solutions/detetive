# TOTEM Detetive IA (Next.js + Baileys) — Docker SWARM, SEM imagem própria / SEM registry.
# Usa node:20-alpine, CLONA este repo no boot, faz o BUILD do Next e roda.
# Você já tem Traefik (provider swarm, resolver letsencrypt). A rede é definida por
# TRAEFIK_NETWORK (padrão: traefik). Ajuste se a sua rede tiver outro nome.
#
# Portainer → Stacks → Add stack → Repository:
#   Repository URL : https://github.com/SEU_USER/detetive-ia.git
#   Compose path   : stack.detetive.yml   |  Authentication = user + PAT (se o repo for privado)
#
# Environment variables (preencha no Portainer):
#   GIT_TOKEN  ← PAT do GitHub (só se o repo for privado)
#   DOMAIN     ← ex.: detetive.seudominio.com.br
#   ANTHROPIC_API_KEY  ELEVENLABS_API_KEY  ELEVENLABS_VOICE_ID  ELEVENLABS_MODEL_ID
#   ELEVENLABS_STABILITY ELEVENLABS_SIMILARITY ELEVENLABS_STYLE ELEVENLABS_SPEED
#   ELEVENLABS_SPEAKER_BOOST ELEVENLABS_OUTPUT_FORMAT ELEVENLABS_LANGUAGE_CODE
#   ADMIN_PASSWORD  CERT_EVENT_NAME  CERT_ORG_NAME

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}   # nome da rede que o seu Traefik observa

volumes:
  baileys_data:                    # sessão do WhatsApp (FORA de /app, que é apagado no boot)

services:
  detetive:
    image: node:20-alpine
    command:
      - sh
      - -c
      - |
        apk add --no-cache git libc6-compat
        rm -rf /app && git clone --depth 1 "https://github.com/DKdevs-Digital-Solutions/detetive.git" /app
        cd /app && npm ci && npm run build
        exec npm run start
    environment:
      - GIT_TOKEN=${GIT_TOKEN}
      - NODE_ENV=production
      - PORT=3005
      - TZ=America/Sao_Paulo
      # Sessão do WhatsApp em caminho persistente FORA de /app (que é recriado a cada boot)
      - BAILEYS_AUTH_DIR=/data/baileys
      - BAILEYS_LOG_LEVEL=warn
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      - ELEVENLABS_MODEL_ID=${ELEVENLABS_MODEL_ID}
      - ELEVENLABS_STABILITY=${ELEVENLABS_STABILITY}
      - ELEVENLABS_SIMILARITY=${ELEVENLABS_SIMILARITY}
      - ELEVENLABS_STYLE=${ELEVENLABS_STYLE}
      - ELEVENLABS_SPEED=${ELEVENLABS_SPEED}
      - ELEVENLABS_SPEAKER_BOOST=${ELEVENLABS_SPEAKER_BOOST}
      - ELEVENLABS_OUTPUT_FORMAT=${ELEVENLABS_OUTPUT_FORMAT}
      - ELEVENLABS_LANGUAGE_CODE=${ELEVENLABS_LANGUAGE_CODE}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CERT_EVENT_NAME=${CERT_EVENT_NAME}
      - CERT_ORG_NAME=${CERT_ORG_NAME}
    volumes:
      - baileys_data:/data
    networks:
      - traefik
    deploy:
      # OBRIGATÓRIO 1 réplica: o Baileys mantém UMA sessão de WhatsApp e UM volume.
      # Duas réplicas brigariam pela mesma sessão e corromperiam a autenticação.
      replicas: 1
      restart_policy: { condition: any }
      # stop-first: derruba a antiga ANTES de subir a nova (evita 2 sessões simultâneas)
      update_config: { parallelism: 1, order: stop-first }
      # Multi-nó? Fixe num nó para o volume baileys_data acompanhar o serviço:
      # placement: { constraints: [ node.hostname == SEU_NO ] }
      labels:
        - traefik.enable=true
        - traefik.swarm.network=${TRAEFIK_NETWORK:-traefik}

        # HTTP -> HTTPS
        - traefik.http.routers.detetive-http.rule=Host(`${DOMAIN}`)
        - traefik.http.routers.detetive-http.entrypoints=web
        - traefik.http.routers.detetive-http.middlewares=detetive-redirect
        - traefik.http.routers.detetive-http.service=detetive-svc
        - traefik.http.middlewares.detetive-redirect.redirectscheme.scheme=https
        - traefik.http.middlewares.detetive-redirect.redirectscheme.permanent=true

        # HTTPS
        - traefik.http.routers.detetive-https.rule=Host(`${DOMAIN}`)
        - traefik.http.routers.detetive-https.entrypoints=websecure
        - traefik.http.routers.detetive-https.tls=true
        - traefik.http.routers.detetive-https.tls.certresolver=letsencrypt
        - traefik.http.routers.detetive-https.service=detetive-svc

        # Porta interna do Next
        - traefik.http.services.detetive-svc.loadbalancer.server.port=3005
